services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: annuaire
      POSTGRES_USER: annuaire
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD manquant}
    volumes:
      - annuaire_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annuaire -d annuaire"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [internal]
    logging:
      options: { max-size: "10m", max-file: "3" }

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://annuaire:${DB_PASSWORD}@db:5432/annuaire
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET manquant}
      INITIAL_USERNAME: ${INITIAL_USERNAME:-moore}
      INITIAL_PASSWORD: ${INITIAL_PASSWORD:-}
      PORT: 3001
    expose: ["3001"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal]
    security_opt: ["no-new-privileges:true"]
    logging:
      options: { max-size: "10m", max-file: "3" }

  client:
    build:
      context: ./client
    restart: unless-stopped
    expose: ["80"]
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [internal]
    security_opt: ["no-new-privileges:true"]
    logging:
      options: { max-size: "10m", max-file: "3" }

volumes:
  annuaire_postgres_data:

networks:
  internal:
